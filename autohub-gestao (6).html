<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>AUTO HUB | Sistema de Gestao</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#07090F;--surface:#0D1117;--surface2:#131920;--border:#1C2333;--text:#E8ECF4;--muted:#4D5A72;--sub:#7A8BA8;--gold:#4F8EF7;--gold-light:#7AAEFF;--gold-dark:#2563C4;--gold-dim:rgba(79,142,247,.13);--red:#EF4444;--red-dim:rgba(239,68,68,.12);--cyan:#38C9A8;--green:#4CAF7D;--radius:14px;--radius-sm:9px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:235px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:20;transition:width .2s;box-shadow:6px 0 30px rgba(0,0,0,.4)}
#sidebar.collapsed{width:0;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:22px}
.brand{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(79,142,247,.1),transparent)}
.brand-icon{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.brand-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.08em}
.brand-sub{font-size:9px;color:var(--sub);margin-top:2px}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-size:9px;color:var(--gold-dark);font-weight:700;text-transform:uppercase;padding:10px 10px 4px;letter-spacing:.08em}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:12px;text-align:left;width:100%;border-left:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Inter',Arial,sans-serif}
.nav-btn:hover{background:rgba(79,142,247,.08);color:var(--text);transform:translateX(2px)}
.nav-btn.active{background:var(--gold-dim);color:var(--gold);font-weight:700;border-left-color:var(--gold)}
.badge{background:var(--red);color:#fff;border-radius:99px;font-size:9px;padding:1px 5px;font-weight:700;margin-left:auto}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.4)}
.card-value{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.card-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 14px;text-align:left;color:var(--gold-dark);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,.03)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label{font-size:10px;color:var(--gold-dark);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:12px;outline:none;width:100%;font-family:'Inter',Arial,sans-serif;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--surface)}
textarea{resize:vertical;min-height:60px}
.btn{padding:8px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));color:#fff;font-weight:700}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-success{background:rgba(76,175,125,.15);color:#4CAF7D;border:1px solid rgba(76,175,125,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:5px 8px;background:rgba(255,255,255,.05);border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:13px;line-height:1;color:var(--sub)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.modal{background:var(--surface);border:1px solid var(--gold-dark);border-radius:16px;padding:24px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.sbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;display:inline-block}
.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{padding-left:30px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;color:var(--muted)}
.empty{padding:36px;text-align:center;color:var(--muted);font-size:13px}
.alert-yellow{padding:10px 14px;border-radius:9px;font-size:12px;margin-bottom:14px;background:rgba(201,168,76,.1);border:1px solid var(--gold);color:var(--gold-light)}
.dre-row{display:flex;justify-content:space-between;padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:3px}
.dre-total{font-weight:800;font-size:14px;background:rgba(201,168,76,.06);border-radius:8px;border:1px solid rgba(201,168,76,.1)}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.report-title{font-weight:700;font-size:14px;margin-bottom:14px;color:var(--gold)}
.tab-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.tab-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
#notif{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-weight:600;font-size:12px;z-index:999;opacity:0;pointer-events:none;max-width:300px;transition:opacity .3s}
#notif.show{opacity:1}
#notif.ok{background:linear-gradient(135deg,#5a4309,#8B6914);color:#fff;border:1px solid var(--gold)}
#notif.err{background:#7F1D1D;color:#FCA5A5;border:1px solid var(--red)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:300}
.confirm-box{background:var(--surface);border:1px solid var(--red);border-radius:14px;padding:24px;max-width:360px;width:90%;text-align:center}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;background-image:radial-gradient(ellipse at 60% 40%,rgba(79,142,247,.08) 0%,transparent 60%)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .logo-icon{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;margin:0 auto 14px;letter-spacing:-.5px;box-shadow:0 8px 30px rgba(79,142,247,.35)}
.login-logo h1{font-size:22px;font-weight:800;color:var(--text);margin:0}
.login-logo p{font-size:12px;color:var(--muted);margin:6px 0 0}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:14px;outline:none;box-sizing:border-box;transition:border-color .2s}
.login-field input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));border:none;border-radius:var(--radius-sm);padding:13px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:#FCA5A5;margin-top:12px;display:none;text-align:center}
@media(max-width:620px){#sidebar{position:fixed;height:100vh}.form-grid{grid-template-columns:1fr}.card-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">AH</div>
      <h1>AUTO HUB</h1>
      <p>Sistema de Gestao Empresarial</p>
    </div>
    <div class="login-field"><label>Usuario</label><input type="text" id="loginUser" placeholder="Digite seu usuario" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()"></div>
    <div class="login-field"><label>Senha</label><input type="password" id="loginPass" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="loginError">Usuario ou senha incorretos</div>
    <div style="text-align:center;margin-top:16px"><button onclick="esqueciSenha()" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;text-decoration:underline">Esqueci minha senha</button></div>
  </div>
</div>
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="brand"><div class="brand-icon">AH</div><div><div class="brand-title">AUTO HUB</div><div class="brand-sub" id="syncStatus">Conectando...</div></div></div>
    <nav id="nav"></nav>
  </aside>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px">&#9776;</button>
        <span id="pageTitle" style="font-weight:700;font-size:15px;color:var(--gold)"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="todayDate" style="font-size:11px;color:var(--muted)"></span>
        <div style="display:flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:4px 12px">
          <span style="font-size:11px;color:var(--gold)">&#128100;</span>
          <span id="userLabel" style="font-size:12px;font-weight:600;color:var(--gold)"></span>
          <button onclick="fazerLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;margin-left:4px" title="Sair">&#128275;</button>
        </div>
      </div>
    </div>
    <div id="content"><div id="loadingScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted)"><div class="spinner"></div><span>Conectando...</span></div></div>
  </div>
</div>
<div id="notif"></div>
<script>
// ══ CONFIGURACAO — preencha antes de publicar ══
var FIREBASE_CONFIG={apiKey:"AIzaSyAlYPDKW9CVWO2c-hQCczqQ9ITClzCjImc",authDomain:"autohub-sistema-digital.firebaseapp.com",projectId:"autohub-sistema-digital",storageBucket:"autohub-sistema-digital.firebasestorage.app",messagingSenderId:"218267871676",appId:"1:218267871676:web:49061ac0b5d14047b523b9"};
var NOME_EMPRESA="AUTO HUB";
var TENANT_ID="empresa1"; // identificador unico do cliente ex: loja_silva
var ADMIN_WHATS="5562999999999";
// ══════════════════════════════════════════════

var USUARIOS={admin:"hub2026"};
var PERMISSOES_USUARIOS={};
var PERMISSOES_PADRAO=["dashboard","vendas","clients","chamados"];
var usuarioLogado=null,db=null;
var clients=[],sales=[],expenses=[],categories=[],financeiro=[],chamados=[];
var loadedCount=0,currentTab="dashboard",repTab="geral",repMonth="",dreMonth=null,finTab="lancamentos";
var modalSaveFn=null;

var STATUS_MAP={aguardando_boleto:{label:"Aguard. Boleto",color:"#94a3b8"},boleto_gerado:{label:"Boleto Gerado",color:"#f59e0b"},boleto_pago:{label:"Boleto Pago",color:"#10b981"},aguardando_liberacao:{label:"Aguard. Liberacao",color:"#4A90D9"},liberado:{label:"Liberado",color:"#8b5cf6"},cancelada:{label:"Cancelada",color:"#EF4444"}};
var PIPELINE=["aguardando_boleto","boleto_gerado","boleto_pago","aguardando_liberacao","liberado"];
var PRAZOS={aguardando_boleto:1,boleto_gerado:2,boleto_pago:1,aguardando_liberacao:3,liberado:null};
var ETAPAS_FINANCEIRO=["boleto_pago","aguardando_liberacao","liberado"];
var CATS_DRE_EXCLUIR=["venda","compra","compra veiculo","transferencia","retirada de socio","retirada"];
function finDRE(f){var cat=(f.categoria||f.descricao||"").toLowerCase().trim();return CATS_DRE_EXCLUIR.indexOf(cat)<0;}
var CATS_FIN=["Venda","Compra","Despesa","Comissao","Custo Fixo","Retirada de Socio","Imposto","Contabilidade","Outros"];
var BR_STATES=["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

function col(c){return db.collection("tenants/"+TENANT_ID+"/"+c);}

function today(){return new Date().toISOString().split("T")[0];}
function fmtCur(v){return "R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});}
function fmtDate(d){if(!d)return "-";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function getClient(id){return clients.find(function(c){return c.id==id;})||{};}
function monthKey(d){return d?d.slice(0,7):"";}
function getCatLabel(key){var c=categories.find(function(x){return x.key===key;});return c?c.label:key;}
function gv(id){var e=document.getElementById(id);return e?e.value:"";}
function gn(id){return Number(gv(id))||0;}
function sbadge(s){var st=STATUS_MAP[s]||{label:s,color:"#888"};return '<span class="sbadge" style="background:'+st.color+'22;color:'+st.color+';border:1px solid '+st.color+'44">'+st.label+"</span>";}
function notify(msg,type){var el=document.getElementById("notif");el.textContent=(type==="err"?"✕ ":"✓ ")+msg;el.className="show "+(type||"ok");setTimeout(function(){el.className="";},3500);}
function formatarMoeda(input){var v=input.value.replace(/\D/g,"");if(!v){input.value="";return;}v=parseInt(v,10);input.value=(v/100).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function getMoedaValor(id){var el=document.getElementById(id);if(!el)return 0;var v=(el.value||"").replace(/\./g,"").replace(",",".");return Number(v)||0;}
function getAllMonths(){var all=[];sales.forEach(function(s){var m=monthKey(s.saleDate||s.createdAt);if(m&&all.indexOf(m)<0)all.push(m);});expenses.forEach(function(e){var m=monthKey(e.date);if(m&&all.indexOf(m)<0)all.push(m);});financeiro.forEach(function(f){var m=monthKey(f.date);if(m&&all.indexOf(m)<0)all.push(m);});return all.sort();}
function diasNaEtapa(s){var hist=s.historico||{};var entrada=hist[s.status];if(!entrada)return 0;return Math.floor((Date.now()-new Date(entrada).getTime())/86400000);}
function pipOverdue(s){if(s.status==="liberado"||s.status==="cancelada")return false;var prazo=PRAZOS[s.status];if(!prazo)return false;return diasNaEtapa(s)>prazo;}
function confirmDlg(title,msg,fn){var div=document.createElement("div");div.className="confirm-overlay";div.id="confirmOverlay";div.innerHTML='<div class="confirm-box"><h3 style="color:var(--red);margin-bottom:8px">'+title+'</h3><p style="color:var(--sub);font-size:13px;margin-bottom:18px">'+msg+'</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-secondary" onclick="document.getElementById(\'confirmOverlay\').remove()">Cancelar</button><button class="btn btn-danger" id="confirmYes">Confirmar</button></div></div>';document.body.appendChild(div);document.getElementById("confirmYes").onclick=function(){div.remove();fn();};}

function carregarUsuarios(){try{var s=localStorage.getItem("ah_u_"+TENANT_ID);if(s){var o=JSON.parse(s);Object.keys(o).forEach(function(u){USUARIOS[u]=o[u];});}}catch(e){}}
function salvarUsuarios(){try{localStorage.setItem("ah_u_"+TENANT_ID,JSON.stringify(USUARIOS));}catch(e){}}
function carregarPermissoes(){try{var s=localStorage.getItem("ah_p_"+TENANT_ID);if(s)PERMISSOES_USUARIOS=JSON.parse(s);}catch(e){}}
function salvarPermissoes(){try{localStorage.setItem("ah_p_"+TENANT_ID,JSON.stringify(PERMISSOES_USUARIOS));}catch(e){}}
carregarUsuarios();carregarPermissoes();

function fazerLogin(){
  var user=(document.getElementById("loginUser").value||"").trim().toLowerCase();
  var pass=document.getElementById("loginPass").value||"";
  var err=document.getElementById("loginError");
  if(USUARIOS[user]&&USUARIOS[user]===pass){
    usuarioLogado=user;
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="flex";
    document.getElementById("userLabel").textContent=user.charAt(0).toUpperCase()+user.slice(1);
    err.style.display="none";
    initFirebase();
  }else{err.style.display="block";document.getElementById("loginPass").value="";document.getElementById("loginPass").focus();}
}
function esqueciSenha(){var user=(document.getElementById("loginUser").value||"").trim().toLowerCase();var msg=encodeURIComponent("Ola! Preciso resetar a senha do usuario: "+(user||"[informe]")+" no AUTO HUB.");window.open("https://wa.me/"+ADMIN_WHATS+"?text="+msg,"_blank");}
function fazerLogout(){usuarioLogado=null;document.getElementById("app").style.display="none";document.getElementById("loginScreen").style.display="flex";document.getElementById("loginUser").value="";document.getElementById("loginPass").value="";db=null;}

function initFirebase(){
  try{firebase.initializeApp(FIREBASE_CONFIG);}catch(e){}
  db=firebase.firestore();
  window._ct=setTimeout(function(){document.getElementById("syncStatus").textContent=(loadedCount>0?"Parcial":"Offline");document.getElementById("loadingScreen").style.display="none";goTo("dashboard");},8000);
  function snap(c,cb){col(c).onSnapshot(function(s){cb(s);},function(e){console.error(c,e.message);onLoaded();});}
  snap("clients",function(s){clients=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(currentTab==="clients")render();buildNav();});
  snap("sales",function(s){sales=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(["sales","dashboard","vendas"].indexOf(currentTab)>=0)render();});
  snap("expenses",function(s){expenses=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(["expenses","dre","reports","financeiro"].indexOf(currentTab)>=0)render();});
  snap("categories",function(s){categories=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});if(!categories.length)seedCategories();onLoaded();if(currentTab==="categories")render();});
  snap("financeiro",function(s){financeiro=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(["financeiro","dre","dashboard"].indexOf(currentTab)>=0)render();});
  snap("chamados",function(s){chamados=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});if(currentTab==="chamados")render();});
}
function onLoaded(){loadedCount++;if(loadedCount>=5){clearTimeout(window._ct);liberarApp();}}
function liberarApp(){document.getElementById("syncStatus").textContent="Online";document.getElementById("loadingScreen").style.display="none";goTo("dashboard");}

var _saldoInicialCDB=0;
function calcSaldos(){var saldoCaixa=0,saldoCDB=_saldoInicialCDB;financeiro.slice().sort(function(a,b){return(a.date||"").localeCompare(b.date||"");}).forEach(function(f){var isCDB=(f.categoria||"").toLowerCase()==="aplicacao cdb";var valor=Number(f.valor||0);if(isCDB){if(f.tipo==="saida"){saldoCaixa-=valor;saldoCDB+=valor;}else{saldoCDB-=valor;saldoCaixa+=valor;}}else{if(f.tipo==="entrada")saldoCaixa+=valor;else saldoCaixa-=valor;}});return{caixa:saldoCaixa,cdb:saldoCDB,total:saldoCaixa+saldoCDB};}
function calcDRE(m){
  // DRE 100% baseado nos lancamentos do financeiro — vendas sao so acompanhamento
  var mF=financeiro.filter(function(f){return monthKey(f.date)===m;});
  var mE=expenses.filter(function(e){return monthKey(e.date)===m;});
  var entCat=function(cats){return mF.filter(function(f){var c=(f.categoria||"").toLowerCase();return f.tipo==="entrada"&&cats.indexOf(c)>=0;}).reduce(function(a,f){return a+Number(f.valor||0);},0);};
  var saiCat=function(cats){return mF.filter(function(f){var c=(f.categoria||"").toLowerCase();return f.tipo==="saida"&&cats.indexOf(c)>=0;}).reduce(function(a,f){return a+Number(f.valor||0);},0);};
  var receita=mF.filter(function(f){return f.tipo==="entrada"&&(f.categoria||"").toLowerCase()==="venda";}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var cmv=mF.filter(function(f){return f.tipo==="saida"&&(f.categoria||"").toLowerCase()==="compra";}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var lucBrt=receita-cmv;
  var despOper=mE.reduce(function(a,e){return a+Number(e.value||0);},0);
  var comissoes=saiCat(["comissao"]);
  var despFin=saiCat(["despesa","custo fixo","imposto","contabilidade"]);
  var lucLiq=lucBrt-despOper-comissoes-despFin;
  var margem=receita>0?((lucLiq/receita)*100).toFixed(1):0;
  var cxEnt=mF.filter(function(f){return f.tipo==="entrada";}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var cxSai=mF.filter(function(f){return f.tipo==="saida";}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var saldoPeriodo=cxEnt-cxSai;
  // qtd de vendas do mes = lancamentos categoria Venda no financeiro
  var qtdVendas=mF.filter(function(f){return f.tipo==="entrada"&&(f.categoria||"").toLowerCase()==="venda";}).length;
  return{mE:mE,mF:mF,receita:receita,cmv:cmv,lucBrt:lucBrt,despOper:despOper,comissoes:comissoes,despFin:despFin,lucLiq:lucLiq,margem:margem,cxEnt:cxEnt,cxSai:cxSai,saldoPeriodo:saldoPeriodo,qtdVendas:qtdVendas};
}
function calcMonth(m){var d=calcDRE(m);return{receita:d.receita,cmv:d.cmv,gastos:d.despOper,lucroLiquido:d.lucLiq,lucro:d.lucLiq,qtd:d.qtdVendas};}

function imprimirDRE(){
  var d=calcDRE(dreMonth);
  var html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>DRE '+dreMonth+'</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;color:#222;padding:30px}.hdr{display:flex;justify-content:space-between;padding-bottom:12px;border-bottom:3px solid #C9A84C;margin-bottom:20px}.logo{font-size:22px;font-weight:900;color:#8B6914}.dr{display:flex;justify-content:space-between;padding:7px 10px;border-radius:5px;margin-bottom:2px;font-size:13px}.dt{background:#f5f0e0;font-weight:800;font-size:14px;border-top:2px solid #C9A84C}.footer{margin-top:24px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#bbb;text-align:center}@media print{@page{margin:15mm}}</style></head><body><div class="hdr"><div><div class="logo">'+NOME_EMPRESA+'</div><div style="font-size:11px;color:#999">Sistema de Gestao Empresarial</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:800;color:#8B6914">DRE — DEMONSTRATIVO DE RESULTADO</div><div style="font-size:12px;color:#555">Periodo: '+dreMonth+'</div><div style="font-size:10px;color:#aaa">Emitido em: '+new Date().toLocaleString("pt-BR")+'</div></div></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">';
  html+='<div><h3 style="font-size:13px;font-weight:800;color:#8B6914;border-left:4px solid #C9A84C;padding-left:8px;margin:0 0 12px;text-transform:uppercase">DRE</h3>';
  html+='<div class="dr"><span>(+) Receita (cat. Venda)</span><span style="color:#1a5c2a">'+fmtCur(d.receita)+"</span></div>";
  if(d.cmv>0)html+='<div class="dr"><span>(-) Custo de Compra + Canal</span><span style="color:#7F1D1D">-'+fmtCur(d.cmv)+"</span></div>";
  if(d.custosExtras>0)html+='<div class="dr"><span>(-) Custos Extras</span><span style="color:#7F1D1D">-'+fmtCur(d.custosExtras)+"</span></div>";
  html+='<div class="dr dt"><span>= LUCRO BRUTO</span><span style="color:'+(d.lucBrt>=0?"#1a5c2a":"#7F1D1D")+'">'+fmtCur(d.lucBrt)+"</span></div>";
  if(d.comissoes>0)html+='<div class="dr"><span>(-) Comissoes</span><span style="color:#7F1D1D">-'+fmtCur(d.comissoes)+"</span></div>";
  if(d.despFin>0)html+='<div class="dr"><span>(-) Despesas / Impostos</span><span style="color:#7F1D1D">-'+fmtCur(d.despFin)+"</span></div>";
  if(d.despOper>0)html+='<div class="dr"><span>(-) Gastos Operacionais</span><span style="color:#7F1D1D">-'+fmtCur(d.despOper)+"</span></div>";
  html+='<div class="dr dt" style="font-size:15px;margin-top:6px"><span>= LUCRO LIQUIDO</span><span style="color:'+(d.lucLiq>=0?"#1a5c2a":"#7F1D1D")+'">'+fmtCur(d.lucLiq)+" ("+d.margem+"%)</span></div></div>";
  html+='<div><h3 style="font-size:13px;font-weight:800;color:#8B6914;border-left:4px solid #C9A84C;padding-left:8px;margin:0 0 12px;text-transform:uppercase">Fluxo de Caixa</h3>';
  var entCats={};d.mF.filter(function(f){return f.tipo==="entrada";}).forEach(function(f){var c=f.categoria||"Outros";entCats[c]=(entCats[c]||0)+Number(f.valor||0);});
  Object.keys(entCats).forEach(function(c){html+='<div class="dr"><span>(+) '+c+"</span><span style='color:#1a5c2a'>+"+fmtCur(entCats[c])+"</span></div>";});
  html+='<div class="dr dt"><span>Total Entradas</span><span style="color:#1a5c2a">'+fmtCur(d.cxEnt)+"</span></div>";
  var saiCats={};d.mF.filter(function(f){return f.tipo==="saida";}).forEach(function(f){var c=f.categoria||"Outros";saiCats[c]=(saiCats[c]||0)+Number(f.valor||0);});
  Object.keys(saiCats).forEach(function(c){html+='<div class="dr"><span>(-) '+c+"</span><span style='color:#7F1D1D'>-"+fmtCur(saiCats[c])+"</span></div>";});
  html+='<div class="dr dt"><span>Total Saidas</span><span style="color:#7F1D1D">'+fmtCur(d.cxSai)+"</span></div>";
  html+='<div class="dr dt" style="font-size:15px;margin-top:6px"><span>= Saldo do Periodo</span><span style="color:'+(d.saldoPeriodo>=0?"#1a5c2a":"#7F1D1D")+'">'+fmtCur(d.saldoPeriodo)+"</span></div></div></div>";
  html+='<div class="footer">'+NOME_EMPRESA+" | AUTO HUB Sistema de Gestao | "+new Date().toLocaleString("pt-BR")+"</div></body></html>";
  var win=window.open("","_blank");if(!win){alert("Permita popups!");return;}win.document.write(html);win.document.close();setTimeout(function(){win.print();},500);
}
// RELATORIOS
function renderReports(){var tabs=[{id:"geral",label:"Geral"},{id:"porCliente",label:"Por Cliente"},{id:"evolucao",label:"Evolucao"}];var btns=tabs.map(function(t){return'<button class="tab-btn '+(repTab===t.id?"active":"")+'" onclick="repTab=\''+t.id+'\';render()">'+t.label+"</button>";}).join("");var meses=getAllMonths().reverse();if(!repMonth||meses.indexOf(repMonth)<0)repMonth=meses[0]||monthKey(today());var mOpts='<option value="todos">Todos os meses</option>'+meses.map(function(m){return'<option value="'+m+'"'+(m===repMonth?" selected":"")+">"+m+"</option>";}).join("");var body="";if(repTab==="geral")body=repGeral();else if(repTab==="porCliente")body=repCliente();else if(repTab==="evolucao")body=repEvolucao();var h='<div class="report-card" style="display:flex;flex-wrap:wrap;gap:10px;align-items:center"><div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">'+btns+"</div>"+'<select onchange="repMonth=this.value;render()" style="min-width:140px">'+mOpts+"</select></div>";return h+body;}
function repGeral(){
  var dTot=calcDRE("todos_acumulado"); // fallback
  // Acumular todos os meses
  var allM=getAllMonths();
  var rev=0,cmv=0,lucro=0;
  allM.forEach(function(m){var c=calcDRE(m);rev+=c.receita;cmv+=c.cmv;lucro+=c.lucLiq;});
  var expT=expenses.reduce(function(a,e){return a+Number(e.value||0);},0);
  var emAnd=sales.filter(function(s){return s.status!=="liberado"&&s.status!=="cancelada";}).length;
  var totalInterm=sales.reduce(function(a,s){return a+Number(s.intermediacao||0);},0);
  var cards=[[sales.length,"Total Carros","var(--text)"],[emAnd,"Em Andamento","#f59e0b"],[sales.filter(function(s){return s.status==="liberado";}).length,"Liberados","#4CAF7D"],[sales.filter(function(s){return s.status==="cancelada";}).length,"Cancelados","#EF4444"],[fmtCur(rev),"Vol. Negocios","var(--text)"],[fmtCur(totalInterm),"Total Intermediacoes","var(--gold)"],[fmtCur(expT),"Gastos Total","#D4884A"],[fmtCur(lucro),"Resultado Total",lucro>=0?"var(--gold)":"#EF4444"]];var h='<div class="card-grid" style="margin-bottom:16px">';cards.forEach(function(c){h+='<div class="card" style="border-left:3px solid '+c[2]+'"><div class="card-value" style="color:'+c[2]+'">'+c[0]+'</div><div class="card-label">'+c[1]+"</div></div>";});h+='</div><div class="report-card"><div class="report-title">Todos os Carros</div><div class="table-wrap"><table><thead><tr><th>Veiculo</th><th>Placa</th><th>Cliente</th><th>Data</th><th>Valor Carro</th><th>Intermediacao</th><th>Status</th></tr></thead><tbody>';sales.forEach(function(s){var cl=getClient(s.clientId);h+="<tr><td style='font-weight:600'>"+(s.vehicle||s.descricao||"")+"</td><td style='color:var(--cyan)'>"+(s.plate||"-")+"</td><td style='font-size:11px'>"+(cl.name||"-")+"</td><td style='font-size:11px'>"+fmtDate(s.saleDate||s.createdAt)+"</td><td style='color:var(--sub)'>"+(s.value?fmtCur(s.value):"-")+"</td><td style='color:var(--cyan);font-weight:700'>"+(s.intermediacao?fmtCur(s.intermediacao):"-")+"</td><td>"+sbadge(s.status)+"</td></tr>";});if(!sales.length)h+='<tr><td colspan="7" class="empty">Nenhum carro cadastrado</td></tr>';return h+"</tbody></table></div></div>";}
function repCliente(){var grouped={};sales.forEach(function(s){var k=s.clientId||"_sem";if(!grouped[k])grouped[k]={clientId:s.clientId,items:[]};grouped[k].items.push(s);});var rows=Object.keys(grouped).map(function(k){var g=grouped[k],cl=getClient(g.clientId);var tot=g.items.reduce(function(a,s){return a+Number(s.value||0);},0);return{cl:cl,items:g.items,tot:tot};}).sort(function(a,b){return b.tot-a.tot;});var h='<div class="report-card"><div class="report-title">Por Cliente</div><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Cidade/UF</th><th>Qtd</th><th>Total</th><th>Ticket Medio</th></tr></thead><tbody>';rows.forEach(function(r){h+="<tr><td style='font-weight:600'>"+(r.cl.name||"Sem cliente")+"</td><td style='font-size:11px;color:var(--sub)'>"+(r.cl.city||"")+(r.cl.state?"/"+r.cl.state:"")+"</td><td style='color:var(--gold);font-weight:700'>"+r.items.length+"</td><td style='color:#4CAF7D;font-weight:700'>"+fmtCur(r.tot)+"</td><td>"+fmtCur(r.tot/r.items.length)+"</td></tr>";});if(!rows.length)h+='<tr><td colspan="5" class="empty">Nenhuma venda</td></tr>';return h+"</tbody></table></div></div>";}
function repEvolucao(){var allM=getAllMonths();var rows=allM.map(function(m){var c=calcDRE(m);var mg=c.receita>0?((c.lucLiq/c.receita)*100).toFixed(1):0;return{m:m,qtd:c.qtdVendas,rev:c.receita,lc:c.lucLiq,mg:mg};});var totRev=0,totLc=0,totQtd=0;rows.forEach(function(r){totRev+=r.rev;totLc+=r.lc;totQtd+=r.qtd;});var totMg=totRev>0?((totLc/totRev)*100).toFixed(1):0;var h='<div class="report-card"><div class="report-title">Evolucao Mensal</div><div class="table-wrap"><table><thead><tr><th>Mes</th><th>Vendas</th><th>Receita</th><th>Resultado</th><th>Margem</th></tr></thead><tbody>';rows.forEach(function(r){var mgN=Number(r.mg);var mgC=mgN>=5?"#4CAF7D":mgN>=2?"var(--gold)":"#EF4444";h+="<tr><td style='font-weight:700;color:var(--gold)'><button onclick=\"dreMonth='"+r.m+"';goTo('dre')\" style='background:none;border:none;cursor:pointer;color:var(--gold);font-weight:700;font-size:12px'>"+r.m+" &#8599;</button></td><td><span style='background:rgba(201,168,76,.1);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--gold)'>"+r.qtd+"</span></td><td style='color:#4CAF7D;font-weight:600'>"+fmtCur(r.rev)+"</td><td style='font-weight:800;color:"+(r.lc>=0?"#4CAF7D":"#EF4444")+"'>"+fmtCur(r.lc)+"</td><td><span style='background:"+(mgC==="var(--gold)"?"rgba(201,168,76,.12)":"rgba(76,175,125,.12)")+";color:"+mgC+";border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700'>"+r.mg+"%</span></td></tr>";});if(!rows.length)h+='<tr><td colspan="5" class="empty">Sem dados</td></tr>';else{h+="<tr style='background:rgba(201,168,76,.05);border-top:2px solid rgba(201,168,76,.2)'><td style='font-weight:800;color:var(--gold)'>TOTAL</td><td style='font-weight:800;color:var(--gold)'>"+totQtd+"</td><td style='color:#4CAF7D;font-weight:800'>"+fmtCur(totRev)+"</td><td style='font-weight:800;color:"+(totLc>=0?"#4CAF7D":"#EF4444")+"'>"+fmtCur(totLc)+"</td><td><span style='background:rgba(201,168,76,.15);color:var(--gold);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:800'>"+totMg+"%</span></td></tr>";}return h+"</tbody></table></div></div>";}

// BACKUP
function renderBackup(){var itens=[{label:"Vendas",desc:"Todas as vendas",icon:"&#128663;",fn:"exportVendas",count:sales.length},{label:"Financeiro",desc:"Lancamentos",icon:"&#128181;",fn:"exportFinanceiro",count:financeiro.length},{label:"Clientes",desc:"Cadastro completo",icon:"&#128101;",fn:"exportClientes",count:clients.length},{label:"Gastos",desc:"Gastos operacionais",icon:"&#128184;",fn:"exportGastos",count:expenses.length},{label:"Chamados",desc:"Chamados e ocorrencias",icon:"&#128276;",fn:"exportChamados",count:chamados.length}];var h='<div class="report-card"><div class="report-title">&#128190; Backup e Exportacao</div><div style="color:var(--sub);font-size:13px;margin-bottom:20px">Exporte os dados em CSV para backup ou analise externa.</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px">';itens.forEach(function(it){h+='<div class="card" style="border-left:3px solid var(--gold)"><div style="font-size:24px;margin-bottom:8px">'+it.icon+'</div><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+it.label+'</div><div style="color:var(--muted);font-size:11px;margin-bottom:12px">'+it.desc+'</div><div style="display:flex;justify-content:space-between;align-items:center"><span style="color:var(--gold);font-size:11px">'+it.count+' registros</span><button class="btn btn-primary btn-sm" onclick="'+it.fn+'()">&#11015; CSV</button></div></div>';});h+='</div><button class="btn btn-primary" onclick="exportTudo()" style="width:100%;padding:14px;font-size:15px">&#128190; EXPORTAR TUDO (Backup Completo)</button></div>';return h;}
function csvDownload(nome,linhas){var bom="\uFEFF";var blob=new Blob([bom+linhas.join("\n")],{type:"text/csv;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=nome+"_"+today()+".csv";a.click();}
function exportVendas(){var h="Descricao,Placa,Cliente,Data,Status,Valor,Custo,Canal";var r=sales.map(function(s){var cl=getClient(s.clientId);return[s.vehicle||s.descricao,s.plate,cl.name,s.saleDate||s.createdAt,(STATUS_MAP[s.status]||{label:s.status}).label,s.value,s.cost||0,s.channelValue||0].join(",");});csvDownload("vendas",[h].concat(r));notify("Exportado: "+r.length+" vendas!");}
function exportFinanceiro(){var h="Data,Tipo,Descricao,Categoria,Valor,Obs";var r=financeiro.map(function(f){return[f.date,f.tipo,f.descricao||"",f.categoria||"",f.valor,f.obs||""].join(",");});csvDownload("financeiro",[h].concat(r));notify("Exportado: "+r.length+" lancamentos!");}
function exportClientes(){var h="Nome,CPF,CNPJ,Telefone,Email,Cidade,Estado";var r=clients.map(function(c){return[c.name,c.cpf||"",c.cnpj||"",c.phone||"",c.email||"",c.city||"",c.state||""].join(",");});csvDownload("clientes",[h].concat(r));notify("Exportado: "+r.length+" clientes!");}
function exportGastos(){var h="Data,Descricao,Categoria,Valor";var r=expenses.map(function(e){return[e.date,e.desc||"",getCatLabel(e.category),e.value].join(",");});csvDownload("gastos",[h].concat(r));notify("Exportado: "+r.length+" gastos!");}
function exportChamados(){var h="Titulo,Cliente,Numero,Status,Prioridade,Data";var r=chamados.map(function(c){return[c.titulo||"",c.cliente||"",c.numero||"",c.status,c.prioridade||"",c.dataAbertura||""].join(",");});csvDownload("chamados",[h].concat(r));notify("Exportado: "+r.length+" chamados!");}
function exportTudo(){exportVendas();setTimeout(function(){exportFinanceiro();},500);setTimeout(function(){exportClientes();},1000);setTimeout(function(){exportGastos();},1500);setTimeout(function(){exportChamados();},2000);notify("Exportando todos os dados...");}

// USUARIOS
function renderUsuarios(){var isAdmin=usuarioLogado==="admin";var h='<div class="report-card"><div class="report-title">&#128100; Minha Conta — '+usuarioLogado+'</div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary btn-sm" onclick="alterarSenha(\''+usuarioLogado+'\')">&#128274; Alterar Senha</button><button class="btn btn-danger btn-sm" onclick="fazerLogout()">&#128275; Sair</button></div></div>';if(!isAdmin){h+='<div class="report-card" style="margin-top:14px"><div style="color:var(--muted);font-size:13px">Somente o administrador pode gerenciar usuarios.</div></div>';return h;}h+='<div class="report-card" style="margin-top:14px"><div class="report-title">&#128273; Gerenciar Usuarios</div><div class="table-wrap"><table><thead><tr><th>Usuario</th><th>Perfil</th><th>Acoes</th></tr></thead><tbody>';Object.keys(USUARIOS).forEach(function(u){var perms=getUserPerms(u);var permLabel=perms===null?'<span class="sbadge" style="background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)">Admin</span>':'<span class="sbadge" style="background:rgba(74,144,217,.15);color:#4A90D9;border:1px solid rgba(74,144,217,.3)">'+perms.length+" abas</span>";h+="<tr><td style='font-weight:600'>&#128100; "+u+"</td><td>"+permLabel+"</td><td><div style='display:flex;gap:5px;flex-wrap:wrap'><button class='btn btn-secondary btn-sm' onclick=\"alterarSenha('"+u+"')\">Senha</button>"+(u!=="admin"?'<button class="btn btn-primary btn-sm" onclick="editarPermissoes(\''+u+'\')">Permissoes</button><button class="btn btn-danger btn-sm" onclick="removerUsuario(\''+u+'\')">Remover</button>':"")+"</div></td></tr>";});h+="</tbody></table></div><div style='margin-top:14px'><button class='btn btn-primary' onclick='adicionarUsuario()'>+ Adicionar Usuario</button></div></div>";return h;}
function editarPermissoes(user){var perms=PERMISSOES_USUARIOS[user]||PERMISSOES_PADRAO.slice();var allTabs=TABS.filter(function(t){return t.id!=="usuarios";});var checks=allTabs.map(function(t){var checked=perms.indexOf(t.id)>=0;return'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:4px"><input type="checkbox" id="perm_'+t.id+'"'+(checked?" checked":"")+"><span style='font-size:13px'>"+t.label+"</span></label>";}).join("");showModal("Permissoes — "+user,'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+checks+"</div>",function(){var novas=allTabs.filter(function(t){var el=document.getElementById("perm_"+t.id);return el&&el.checked;}).map(function(t){return t.id;});PERMISSOES_USUARIOS[user]=novas;salvarPermissoes();notify("Permissoes de "+user+" atualizadas!");closeModal();render();});}
function adicionarUsuario(){showModal("Adicionar Usuario",'<div class="form-grid"><div class="field"><label>Usuario</label><input id="nu_user" placeholder="Ex: operador1"></div><div class="field"><label>Senha</label><input type="password" id="nu_pass" placeholder="Min 6 caracteres"></div><div class="field"><label>Confirmar Senha</label><input type="password" id="nu_pass2"></div></div>',function(){var user=(document.getElementById("nu_user").value||"").trim().toLowerCase();var pass=document.getElementById("nu_pass").value||"";var pass2=document.getElementById("nu_pass2").value||"";if(!user||user.length<3){notify("3+ caracteres","err");return;}if(USUARIOS[user]){notify("Usuario ja existe","err");return;}if(pass.length<6){notify("Senha 6+ caracteres","err");return;}if(pass!==pass2){notify("Senhas nao conferem","err");return;}USUARIOS[user]=pass;salvarUsuarios();notify("Usuario "+user+" criado!");closeModal();render();});}
function alterarSenha(user){showModal("Alterar Senha — "+user,'<div class="form-grid">'+(user===usuarioLogado?'<div class="field"><label>Senha Atual</label><input type="password" id="ap_atual"></div>':"")+'<div class="field"><label>Nova Senha</label><input type="password" id="ap_nova" placeholder="Min 6 caracteres"></div><div class="field"><label>Confirmar</label><input type="password" id="ap_nova2"></div></div>',function(){if(user===usuarioLogado){var a=document.getElementById("ap_atual").value||"";if(a!==USUARIOS[user]){notify("Senha atual incorreta","err");return;}}var n=document.getElementById("ap_nova").value||"";var n2=document.getElementById("ap_nova2").value||"";if(n.length<6){notify("6+ caracteres","err");return;}if(n!==n2){notify("Senhas nao conferem","err");return;}USUARIOS[user]=n;salvarUsuarios();notify("Senha alterada!");closeModal();});}
function removerUsuario(user){if(user==="admin"||user===usuarioLogado){notify("Nao e possivel remover","err");return;}confirmDlg("Remover Usuario","Deseja remover \""+user+"\"?",function(){delete USUARIOS[user];salvarUsuarios();notify("Removido");render();});}
